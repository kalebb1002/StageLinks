{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
    
    <h1>Login Page</h1>

    <form method="POST" action="">
        {{ form.hidden_tag() }}
        <p>
            {{ form.username() }}
        </p>
        <p>
            {{ form.password() }}
        </p>
        <p>{{ form.submit() }}</p>
    </form>

    <a href="{{url_for('register')}}">Don't have an account? Sign Up</a>

{% endblock %}
